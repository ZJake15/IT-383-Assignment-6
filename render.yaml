# Infrastructure-as-code configuration for Render deployment
databases:
  - name: photo-album-db
    databaseName: photo_album_db
    plan: free

services:
  - type: web
    name: aura-gallery-system
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: photo-album-db
          property: connectionString
      
      # Cloudinary Integration Credentials (Configure these in the Render Dashboard)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
